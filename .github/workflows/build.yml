name: Build Aseprite
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable Long Paths
        run: git config --system core.longpaths true

      # CMake, Ninja, and Inno Setup are all pre-installed on the windows-latest
      # runner image — no need for 'choco install' (saves ~2 min)

      - name: Fetch Latest Release Metadata
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }
          $resp = (Invoke-WebRequest -UseBasicParsing -Headers $headers -Uri https://api.github.com/repos/aseprite/aseprite/releases/latest).Content | ConvertFrom-Json
          $asset = $resp.assets | Where-Object { $_.name -like "*Source.zip" } | Select-Object -First 1
          echo "DOWNLOAD_URL=$($asset.browser_download_url)" >> $env:GITHUB_ENV
          echo "ASE_VER=$($resp.tag_name)" >> $env:GITHUB_ENV

      - name: Download & Extract Source and Skia
        shell: powershell
        run: |
          # Download both archives in parallel (network I/O bound)
          $wd = $PWD.Path
          $srcJob = Start-Job -ScriptBlock {
            param($url, $wd)
            Set-Location $wd
            Invoke-WebRequest -Uri $url -OutFile "aseprite_src.zip"
          } -ArgumentList $env:DOWNLOAD_URL, $wd

          $skiaJob = Start-Job -ScriptBlock {
            param($wd)
            Set-Location $wd
            Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/latest/download/Skia-Windows-Release-x64.zip" -OutFile "skia.zip"
          } -ArgumentList $wd

          Wait-Job -Job $srcJob, $skiaJob | Out-Null
          if ($srcJob.State -ne 'Completed') { Receive-Job $srcJob; throw "Source download failed" }
          if ($skiaJob.State -ne 'Completed') { Receive-Job $skiaJob; throw "Skia download failed" }
          Remove-Job -Job $srcJob, $skiaJob

          # Extract source
          7z x "aseprite_src.zip" -o"temp_ext" -y
          $rootFile = Get-ChildItem -Path "temp_ext" -Filter "CMakeLists.txt" -Recurse | Select-Object -First 1
          mkdir aseprite -Force
          Get-ChildItem -Path "$($rootFile.Directory.FullName)\*" | Move-Item -Destination "aseprite" -Force

          # Extract Skia
          mkdir skia -Force
          7z x "skia.zip" -o"skia" -y

      - name: Initialize MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Disable ccache (Strawberry Perl's MinGW ccache deadlocks with MSVC)
        continue-on-error: true
        shell: powershell
        run: |
          # Strawberry Perl bundles a MinGW/POSIX-built ccache.exe that CMake
          # auto-detects and uses as CMAKE_CXX_COMPILER_LAUNCHER.  When it wraps
          # the native MSVC cl.exe (especially with /showIncludes), the POSIX→Win32
          # I/O pipe mismatch causes a silent deadlock that hangs the build.
          # ccache is also pointless in CI (no persistent cache between runs), so
          # we remove it entirely rather than try to fix the integration.
          $ccachePath = "C:\Strawberry\c\bin\ccache.exe"
          if (Test-Path $ccachePath) {
            Rename-Item $ccachePath "ccache.exe.bak" -Force
            echo "[+] Renamed Strawberry Perl ccache.exe to ccache.exe.bak to prevent MSVC deadlock"
          } else {
            echo "[+] Strawberry Perl ccache.exe not found - nothing to disable"
          }

      - name: Run CMake Configuration
        shell: powershell
        run: |
          $abs_src = Join-Path $env:GITHUB_WORKSPACE "aseprite"
          $abs_skia = Join-Path $env:GITHUB_WORKSPACE "skia"
          $abs_build = Join-Path $env:GITHUB_WORKSPACE "build"
          mkdir $abs_build -Force
          Set-Location $abs_build
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$abs_skia" `
            -DSKIA_LIBRARY_DIR="$abs_skia\out\Release-x64" `
            -DSKIA_LIBRARY="$abs_skia\out\Release-x64\skia.lib" `
            -DENABLE_UPDATER=OFF `
            -DENABLE_TESTS=OFF `
            -DENABLE_BENCHMARKS=OFF `
            -DCMAKE_JOB_POOLS="link=1" `
            -DCMAKE_JOB_POOL_LINK=link `
            "$abs_src"

      - name: Disable Windows Defender Real-Time Monitoring
        continue-on-error: true
        shell: powershell
        run: |
          try {
            Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction Stop
            echo "[+] Windows Defender real-time monitoring disabled for build performance"
          } catch {
            echo "[!] Could not disable Defender (tamper protection may be active) - continuing build anyway"
          }

      - name: Compile with Ninja
        timeout-minutes: 20
        shell: cmd
        run: |
          cd build
          ninja -j 4 aseprite < NUL

      - name: Collect Dependencies (DLLs)
        shell: powershell
        run: |
          # Copy OpenSSL DLLs to the bin folder so the app can run
          $binDir = "$env:GITHUB_WORKSPACE\build\bin"
          $sslDir = "C:\Program Files\OpenSSL\bin"
          Copy-Item "$sslDir\libcrypto-3-x64.dll" -Destination $binDir -Force
          Copy-Item "$sslDir\libssl-3-x64.dll" -Destination $binDir -Force
          echo "[+] DLLs copied to $binDir"

      - name: Package Installer (Inno Setup)
        shell: powershell
        run: |
          $binPath = Join-Path $env:GITHUB_WORKSPACE "build\bin"
          $iss = @"
          [Setup]
          AppName=Aseprite
          AppVersion=${{ env.ASE_VER }}
          DefaultDirName={autopf}\Aseprite
          DefaultGroupName=Aseprite
          OutputBaseFilename=aseprite-setup
          OutputDir=installer
          Compression=lzma
          SolidCompression=yes
          [Files]
          Source: "$binPath\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\Aseprite"; Filename: "{app}\aseprite.exe"
          "@
          mkdir installer -Force
          $iss | Out-File -FilePath "aseprite.iss" -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" aseprite.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.ASE_VER }}
          name: Aseprite ${{ env.ASE_VER }}
          files: installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Installer
          path: installer/*.exe
